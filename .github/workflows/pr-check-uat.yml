name: PR Check (UAT)

on:
  pull_request:
    branches: [ "dev" ]

jobs:
  check-alembic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen

      # ไฮไลต์สำคัญ: ด่านตรวจจับ Multiple Heads!
      - name: Check Alembic Multiple Heads
        run: |
          HEADS=$(uv run alembic heads | wc -l)
          if [ "$HEADS" -gt 1 ]; then
            echo "❌ Error: ตรวจพบ Alembic Multiple Heads! Database ตีกันแล้วครับ"
            echo "👉 ให้ Dev รัน 'alembic merge heads' ในเครื่องตัวเองก่อน แล้ว push มาใหม่นะ"
            exit 1
          fi
          echo "✅ โครงสร้าง Database ปกติ ไม่มี Multiple Heads"