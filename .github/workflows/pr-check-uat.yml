name: PR Check (UAT)

on:
  pull_request:
    branches: [ "dev" ]

jobs:
  check-alembic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Ruff
        run: uv tool install ruff

      - name: Lint Code (Critical Errors Only)
        run: uv run ruff check . --select=E9,F63,F7,F82

      - name: Smoke Test Application Boot (Check for Module Errors)
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        run: uv run python -c "import src.database.models"

      # ไฮไลต์สำคัญ: ด่านตรวจจับ Multiple Heads!
      - name: Check Alembic Multiple Heads
        run: |
          HEADS=$(uv run alembic heads | wc -l)
          if [ "$HEADS" -gt 1 ]; then
            echo "❌ Error: ตรวจพบ Alembic Multiple Heads! Database ตีกันแล้วครับ"
            echo "👉 ให้ Dev รัน 'alembic merge heads' ในเครื่องตัวเองก่อน แล้ว push มาใหม่นะ"
            exit 1
          fi
          echo "✅ โครงสร้าง Database ปกติ ไม่มี Multiple Heads"