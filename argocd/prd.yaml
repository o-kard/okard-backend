apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: okard-backend-prd
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: backend=ghcr.io/o-kard/okard-backend
    argocd-image-updater.argoproj.io/backend.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/backend.allow-tags: regexp:^prd-.*$
spec:
  project: default
  source:
    repoURL: 'https://github.com/o-kard/okard-backend.git'
    targetRevision: main
    path: k3s/overlays/prd
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true