apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: okard-backend-ingress
  annotations:
    # Example for Traefik (default in K3s)
    kubernetes.io/ingress.class: "traefik"
    # Or if you use NGINX:
    # kubernetes.io/ingress.class: "nginx"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
    - host: api-uat.081246.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: okard-backend-svc
                port:
                  number: 80
  # Uncomment below for TLS
  # tls:
  #   - hosts:
  #       - api.uat.okard.com
  #     secretName: okard-backend-tls
